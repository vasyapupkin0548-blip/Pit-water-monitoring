<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RG Gold Mobile</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        #map { height: 50vh; width: 100%; background: #cbd5e1; }
        @media (min-width: 768px) { #map { height: 100vh; } }
        .mobile-scroll { height: 50vh; overflow-y: auto; }
        @media (min-width: 768px) { .mobile-scroll { height: 100vh; } }
    </style>
</head>
<body class="bg-gray-100 flex flex-col md:flex-row h-screen overflow-hidden">

    <div class="flex-1 relative border-b md:border-r border-gray-300">
        <div id="map"></div>
        <div class="absolute top-2 left-12 z-[1000] bg-white/80 p-2 rounded text-[10px] font-bold shadow">
            Тапните по карте для выбора точки
        </div>
    </div>

    <div class="w-full md:w-[400px] bg-white mobile-scroll flex flex-col shadow-2xl">
        <div class="p-4 border-b bg-slate-900 text-white flex justify-between items-center">
            <div>
                <h1 class="text-lg font-black">RG GOLD</h1>
                <p class="text-[8px] text-blue-300 uppercase tracking-widest">Мобильный мониторинг</p>
            </div>
            <button onclick="exportToExcel()" class="bg-emerald-600 text-[10px] px-3 py-2 rounded font-bold">EXCEL ⬇</button>
        </div>

        <div class="p-4 border-b space-y-3">
            <div class="grid grid-cols-2 gap-2">
                <div class="bg-slate-50 p-2 rounded border text-center">
                    <label class="block text-[9px] font-bold text-slate-400">X</label>
                    <input type="text" id="posX" readonly class="w-full bg-transparent text-center font-bold text-sm outline-none">
                </div>
                <div class="bg-slate-50 p-2 rounded border text-center">
                    <label class="block text-[9px] font-bold text-slate-400">Y</label>
                    <input type="text" id="posY" readonly class="w-full bg-transparent text-center font-bold text-sm outline-none">
                </div>
            </div>

            <form id="waterForm" class="space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="debit" step="0.1" required placeholder="Дебит л/с" class="p-3 border rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    <input type="number" id="elevation" required placeholder="Отметка м" class="p-3 border rounded-xl text-sm outline-none">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <select id="side" class="p-3 border rounded-xl text-sm bg-white outline-none">
                        <option>Северный</option><option>Южный</option><option>Восточный</option><option>Западный</option>
                    </select>
                    <input type="text" id="bench" required placeholder="Уступ" class="p-3 border rounded-xl text-sm outline-none">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg uppercase text-xs active:bg-blue-800 transition-all">
                    СОХРАНИТЬ ЗАМЕР
                </button>
            </form>
        </div>

        <div class="p-4 flex-1">
            <div class="flex justify-between items-center mb-2">
                <h3 class="font-black text-[10px] text-slate-500 uppercase tracking-widest">Журнал (в памяти устройства)</h3>
                <button onclick="clearStorage()" class="text-[9px] text-red-500 font-bold underline">Очистить всё</button>
            </div>
            <div id="pointsList" class="space-y-2 pb-10"></div>
        </div>
    </div>

    <script>
        let savedPoints = JSON.parse(localStorage.getItem('pitData')) || [];
        let map, tempMarker;

        const mapConfig = { url: 'map.jpg', minX: 45663, minY: 15700, maxX: 47946, maxY: 17429 };

        function getMarkerColor(debit) {
            const d = parseFloat(debit);
            return d <= 2 ? '#22c55e' : (d <= 5 ? '#fac800' : '#ef4444');
        }

        function initMap() {
            const imageBounds = [[mapConfig.minY, mapConfig.minX], [mapConfig.maxY, mapConfig.maxX]];
            map = L.map('map', { crs: L.CRS.Simple, maxBounds: imageBounds, minZoom: -3, maxZoom: 5, attributionControl: false });
            L.imageOverlay(mapConfig.url, imageBounds).addTo(map);
            map.fitBounds(imageBounds);

            // Отрисовка старых точек из памяти
            savedPoints.forEach(p => drawPoint(p));

            map.on('click', function(e) {
                if (tempMarker) map.removeLayer(tempMarker);
                tempMarker = L.circleMarker(e.latlng, { radius: 10, fillColor: "#1e293b", color: "#fff", weight: 3, fillOpacity: 1 }).addTo(map);
                document.getElementById('posX').value = e.latlng.lng.toFixed(1);
                document.getElementById('posY').value = e.latlng.lat.toFixed(1);
            });
        }

        function drawPoint(p) {
            L.circleMarker([p.Y_Coord, p.X_Coord], { radius: 12, fillColor: getMarkerColor(p.Дебит_л_с), color: "#fff", weight: 2, fillOpacity: 0.9 })
             .addTo(map).bindPopup(`<b>${p.Борт}</b>: ${p.Дебит_л_с} л/с`);
        }

        document.getElementById('waterForm').onsubmit = function(e) {
            e.preventDefault();
            const x = document.getElementById('posX').value;
            if (!x) return alert("Отметьте точку!");

            const point = {
                "Время": new Date().toLocaleString('ru-RU'),
                "X_Coord": x, "Y_Coord": document.getElementById('posY').value,
                "Дебит_л_с": document.getElementById('debit').value,
                "Отметка_м": document.getElementById('elevation').value,
                "Борт": document.getElementById('side').value,
                "Уступ": document.getElementById('bench').value
            };

            savedPoints.push(point);
            localStorage.setItem('pitData', JSON.stringify(savedPoints));
            drawPoint(point);
            updateList();
            this.reset();
            document.getElementById('posX').value = '';
            document.getElementById('posY').value = '';
            if (tempMarker) map.removeLayer(tempMarker);
        };

        function updateList() {
            const list = document.getElementById('pointsList');
            list.innerHTML = savedPoints.map(p => `
                <div class="p-3 bg-white border border-slate-200 rounded-xl shadow-sm border-l-4" style="border-left-color: ${getMarkerColor(p.Дебит_л_с)}">
                    <div class="flex justify-between items-center font-black text-[10px]">
                        <span>${p.Борт} | УСТУП ${p.Уступ}</span>
                        <span style="color: ${getMarkerColor(p.Дебит_л_с)}">${p.Дебит_л_с} л/с</span>
                    </div>
                </div>
            `).reverse().join('');
        }

        function clearStorage() {
            if(confirm("Удалить все данные из памяти телефона?")) {
                localStorage.clear();
                location.reload();
            }
        }

        function exportToExcel() {
            if (savedPoints.length === 0) return alert("Нет данных");
            const ws = XLSX.utils.json_to_sheet(savedPoints);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Data");
            XLSX.writeFile(wb, `RG_Gold_Mobile_${new Date().toISOString().slice(0,10)}.xlsx`);
        }

        window.onload = () => { initMap(); updateList(); };
    </script>
</body>
</html>
